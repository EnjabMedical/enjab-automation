name: enjab-automation

x-node-env: &node-env
  NODE_ENV: development
  TZ: Asia/Dubai
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: postgres://${POSTGRES_USER:-enjab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-enjab}
  REDIS_URL: redis://redis:6379
  APP_URL: ${APP_URL:-https://automations.enjab.ae}
  INSTAHMS_BASE_URL: ${INSTAHMS_BASE_URL}
  INSTAHMS_HOSPITAL: ${INSTAHMS_HOSPITAL}
  INSTAHMS_USER_ID: ${INSTAHMS_USER_ID}
  INSTAHMS_PASSWORD: ${INSTAHMS_PASSWORD}
  WA_PHONE_NUMBER_ID: ${WA_PHONE_NUMBER_ID}
  WA_BUSINESS_ACCOUNT_ID: ${WA_BUSINESS_ACCOUNT_ID}
  WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN}
  WA_APP_ID: ${WA_APP_ID}
  WA_APP_SECRET: ${WA_APP_SECRET}
  WA_WEBHOOK_VERIFY_TOKEN: ${WA_WEBHOOK_VERIFY_TOKEN}
  WA_GRAPH_VERSION: ${WA_GRAPH_VERSION:-v22.0}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enjab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-enjab}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enjab} -d ${POSTGRES_DB:-enjab}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/apps/web/.next
    command: sh -c "npm install --include=dev && npm run dev -w @enjab/web"
    environment:
      <<: *node-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    expose:
      - "3000"

  worker:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    command: sh -c "npm install --include=dev && npm run start -w @enjab/worker"
    environment:
      <<: *node-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  nginx:
    image: jonasal/nginx-certbot:latest
    restart: unless-stopped
    environment:
      CERTBOT_EMAIL: mhd12@devlix.org
      USE_ECDSA: "1"
      RENEWAL_INTERVAL: 8d
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      - nginx_secrets:/etc/letsencrypt
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  web_next_cache:
  worker_node_modules:
  nginx_secrets:
