server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2       on;
    server_name automations.enjab.ae;

    # jonasal/nginx-certbot provisions these via Let's Encrypt on first boot.
    ssl_certificate         /etc/letsencrypt/live/automations.enjab.ae/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/automations.enjab.ae/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/automations.enjab.ae/chain.pem;

    # Reasonable defaults — we can tighten in Phase 6.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4m;

    # Real-client IP for the app
    real_ip_header X-Forwarded-For;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Required for Next.js HMR + future SSE/WebSocket inbox
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600;
    }
}
