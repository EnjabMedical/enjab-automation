# EWA — chat + skills UI for the Enjab Medical Centre.
# The API is a Node process on the host that also serves the built SPA, so
# nginx only terminates TLS and reverse-proxies everything to it.
#
# The compose network gateway 172.18.0.1 = the host from inside this container.

server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2       on;
    server_name ewa.enjab.ae;

    ssl_certificate         /etc/letsencrypt/live/ewa.enjab.ae/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/ewa.enjab.ae/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ewa.enjab.ae/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Up from the default 1 MB so the chat composer + file uploads aren't capped.
    client_max_body_size 32m;

    real_ip_header X-Forwarded-For;

    location / {
        proxy_pass         http://172.18.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # SSE chat streams need long-lived, unbuffered connections.
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600;
        proxy_buffering    off;
    }
}
